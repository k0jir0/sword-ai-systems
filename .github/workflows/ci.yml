name: sword-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: .
        run: pytest -q

  retrieval-baseline:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run retrieval baseline gate
        working-directory: .
        env:
          HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
        run: |
          python scripts/eval_retrieval.py --path data/fixtures --glob "core_expectations.txt" --probe-file data/fixtures/retrieval_probes.txt --top-k 2 --min-retrieval-recall 1.0 --min-keyword-recall 1.0
