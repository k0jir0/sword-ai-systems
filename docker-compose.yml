services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - path: .env
        required: false
      - path: .env.example
        required: false
    command: >
      bash -lc "pip install --no-cache-dir -e . &&
      uvicorn backend.app.main:app --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
